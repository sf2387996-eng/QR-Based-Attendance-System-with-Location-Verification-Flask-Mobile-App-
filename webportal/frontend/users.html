<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users — QR Attendance Admin</title>
    <meta name="description" content="Manage students and teachers in the QR-Based Attendance System">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">📍</div>
                <h2>QR Attendance <span>Admin Portal</span></h2>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-label">Main</div>
                <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="users.html"     class="nav-item"><i class="fas fa-users"></i> Users</a>
                <a href="courses.html"   class="nav-item"><i class="fas fa-book"></i> Courses</a>
                <a href="attendance.html" class="nav-item"><i class="fas fa-clipboard-check"></i> Attendance</a>
                <a href="reports.html"   class="nav-item"><i class="fas fa-file-alt"></i> Reports</a>
                <div class="nav-label">Account</div>
                <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
            <div class="sidebar-footer">
                <div class="admin-badge"><div class="avatar">A</div><span id="adminName">Admin</span></div>
            </div>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <div style="display:flex;align-items:center;gap:1rem;">
                    <button class="menu-toggle"><i class="fas fa-bars"></i></button>
                    <h1>User Management</h1>
                </div>
            </header>

            <div class="page-content">
                <div class="panel">
                    <div class="panel-header">
                        <h2>Students & Teachers</h2>
                        <button class="btn btn-primary btn-sm" onclick="openAddModal()">
                            <i class="fas fa-plus"></i> Add User
                        </button>
                    </div>
                    <div class="panel-body">
                        <div class="toolbar">
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchInput" placeholder="Search by name or email…">
                            </div>
                            <select class="filter-select" id="roleFilter">
                                <option value="">All Roles</option>
                                <option value="Student">Students</option>
                                <option value="Teacher">Teachers</option>
                            </select>
                        </div>
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Name</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Department</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTable"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="pagination" id="usersPagination"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="userModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add User</h3>
                <button class="modal-close" onclick="closeModal('userModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <input type="hidden" id="editRole">
                    <div class="form-group">
                        <label for="userName">Full Name</label>
                        <input type="text" class="form-control" id="userName" required>
                    </div>
                    <div class="form-group">
                        <label for="userEmail">Email Address</label>
                        <input type="email" class="form-control" id="userEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="userRole">Role</label>
                        <select class="form-control" id="userRole" required>
                            <option value="">Select role</option>
                            <option value="Student">Student</option>
                            <option value="Teacher">Teacher</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="userDept">Department</label>
                        <select class="form-control" id="userDept">
                            <option value="">Select department</option>
                        </select>
                    </div>
                    <div class="form-group" id="rollGroup">
                        <label for="userRoll">Roll Number</label>
                        <input type="text" class="form-control" id="userRoll">
                    </div>
                    <div class="form-group" id="passwordGroup">
                        <label for="userPassword">Password <span id="pwdHint" style="font-size:0.75rem;color:var(--text-muted);">(required)</span></label>
                        <input type="password" class="form-control" id="userPassword" placeholder="Enter password">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('userModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if (!requireAuth()) throw 'Not authenticated';
        initSidebar();

        let currentPage = 1;
        let departments = [];

        async function loadDepartments() {
            try {
                departments = await api('/departments');
                const sel = document.getElementById('userDept');
                sel.innerHTML = '<option value="">Select department</option>';
                departments.forEach(d => sel.innerHTML += `<option value="${d.id}">${d.name}</option>`);
            } catch (e) {}
        }

        async function loadUsers(page = 1) {
            currentPage = page;
            const search = document.getElementById('searchInput').value.trim();
            const role   = document.getElementById('roleFilter').value;
            let params = `?page=${page}&per_page=10`;
            if (search) params += `&search=${encodeURIComponent(search)}`;
            if (role) params += `&role=${role}`;

            showLoading();
            try {
                const data = await api(`/users${params}`);
                const tbody = document.getElementById('usersTable');
                if (!data.users.length) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem;">No users found</td></tr>';
                } else {
                    tbody.innerHTML = data.users.map((u, i) => `
                        <tr>
                            <td>${(page - 1) * 10 + i + 1}</td>
                            <td><strong>${u.name}</strong></td>
                            <td>${u.email}</td>
                            <td><span class="badge badge-${u.role.toLowerCase()}">${u.role}</span></td>
                            <td>${u.department || '—'}</td>
                            <td class="actions">
                                <button class="btn-icon" onclick='editUser(${JSON.stringify(u)})'><i class="fas fa-pen"></i></button>
                                <button class="btn-icon delete" onclick="deleteUser('${u.role.toLowerCase()}', ${u.id})"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');
                }
                renderPagination('usersPagination', data.page, data.pages, loadUsers);
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                hideLoading();
            }
        }

        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add User';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('editRole').value = '';
            document.getElementById('userRole').disabled = false;
            document.getElementById('rollGroup').style.display = 'block';
            document.getElementById('userPassword').required = true;
            document.getElementById('pwdHint').textContent = '(required)';
            openModal('userModal');
        }

        function editUser(u) {
            document.getElementById('modalTitle').textContent = 'Edit User';
            document.getElementById('userId').value = u.id;
            document.getElementById('editRole').value = u.role.toLowerCase();
            document.getElementById('userName').value = u.name;
            document.getElementById('userEmail').value = u.email;
            document.getElementById('userRole').value = u.role;
            document.getElementById('userRole').disabled = true;
            document.getElementById('userDept').value = u.department_id || '';
            document.getElementById('userPassword').value = '';
            document.getElementById('userPassword').required = false;
            document.getElementById('pwdHint').textContent = '(leave blank to keep current)';
            if (u.role === 'Student') {
                document.getElementById('rollGroup').style.display = 'block';
                document.getElementById('userRoll').value = u.roll_number || '';
            } else {
                document.getElementById('rollGroup').style.display = 'none';
            }
            openModal('userModal');
        }

        async function saveUser() {
            const id   = document.getElementById('userId').value;
            const role = id ? document.getElementById('editRole').value : document.getElementById('userRole').value;
            const body = {
                name: document.getElementById('userName').value.trim(),
                email: document.getElementById('userEmail').value.trim(),
                role: document.getElementById('userRole').value,
                department_id: document.getElementById('userDept').value || null,
                roll_number: document.getElementById('userRoll').value.trim() || null
            };
            const pw = document.getElementById('userPassword').value;
            if (pw) body.password = pw;

            try {
                if (id) {
                    await api(`/users/${role}/${id}`, { method: 'PUT', body: JSON.stringify(body) });
                    showToast('User updated successfully', 'success');
                } else {
                    await api('/users', { method: 'POST', body: JSON.stringify(body) });
                    showToast('User added successfully', 'success');
                }
                closeModal('userModal');
                loadUsers(currentPage);
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function deleteUser(role, id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            try {
                await api(`/users/${role}/${id}`, { method: 'DELETE' });
                showToast('User deleted', 'success');
                loadUsers(currentPage);
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // Toggle roll number field visibility
        document.getElementById('userRole').addEventListener('change', (e) => {
            document.getElementById('rollGroup').style.display = e.target.value === 'Student' ? 'block' : 'none';
        });

        document.getElementById('searchInput').addEventListener('input', debounce(() => loadUsers(1)));
        document.getElementById('roleFilter').addEventListener('change', () => loadUsers(1));

        loadDepartments();
        loadUsers();
    </script>
</body>
</html>
