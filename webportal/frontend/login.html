<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — QR Attendance System</title>
    <meta name="description" content="Secure admin login for the QR-Based Attendance System">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="icon">📍</div>
                <h1>QR Attendance</h1>
                <p>Admin Portal — Secure Login</p>
            </div>

            <form id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="admin@admin.com" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
                <div id="loginError" style="color:var(--danger);font-size:0.85rem;margin-bottom:1rem;display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:var(--text-muted);">
                Default: admin@admin.com / admin123
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // If already logged in, go to dashboard
        if (getToken()) window.location.href = 'dashboard.html';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            errEl.style.display = 'none';
            btn.classList.add('loading');

            try {
                const data = await api('/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                setToken(data.token);
                setAdmin(data.admin);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errEl.textContent = err.message || 'Login failed';
                errEl.style.display = 'block';
            } finally {
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
